<style>

body{

.top-right{

.username{

}

.menu div{
padding:14px 12px;

}

.menu div:hover{

}

.subscribe{

.main{

.hero{

.title{

.panel{

.banner{

.row{

.left{

.old{

.bonus{
background:#232736;
color:#d7d7d7;
padding:6px 10px;
border-radius:999px;

.buy{
width:205px;
height:40px;
background:#343a4d;
border:none;
border-radius:8px;
color:#fff;
font-size:16px;
font-weight:700;
cursor:pointer
}

.faq .item{
height:58px;
border:1px solid #272c39;
border-radius:8px;
padding:0 16px;
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:14px;
color:#ddd
}

.footer{
margin-top:36px;
color:#9ca3b7;
text-align:center;
font-size:13px
}

.popup-bg{
position:fixed;
inset:0;
background:rgba(0,0,0,.82);
display:none;
z-index:5000;
opacity:0;
transition:opacity .2s
}

.popup-bg.show{
opacity:1
}

.popup{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%) scale(.96);
width:420px;
max-height:85vh;
overflow-y:auto;
background:#121215;
border:1px solid #272c39;
border-radius:12px;
padding:22px;
transition:transform .18s
}

.popup-bg.show .popup{
transform:translateX(-50%) scale(1)
}

.popup-close{
float:right;
color:#aaa;
font-size:22px;
cursor:pointer
}
</style>
</head>
<body>

<script>
let searchTimeout;

async function handleUserSearch(){

let v = userSearch.value.trim();
let loading = document.getElementById("searchLoading");
let results = document.getElementById("searchResults");

clearTimeout(searchTimeout);
results.innerHTML = "";

if(!v){
loading.style.display="none";
return;
}

loading.style.display="block";

searchTimeout=setTimeout(async()=>{

try{

const res = await fetch(
`https://users.roproxy.com/v1/users/search?keyword=${encodeURIComponent(v)}&limit=10`
);

const data = await res.json();

loading.style.display="none";

if(!data.data || data.data.length===0){
results.innerHTML=`
<div style="padding:14px;text-align:center;color:#9ca3b7">
No users found
</div>`;
return;
}

for(const user of data.data){

const thumbRes = await fetch(
`https://thumbnails.roproxy.com/v1/users/avatar-headshot?userIds=${user.id}&size=150x150&format=Png&isCircular=true`
);

const thumbData = await thumbRes.json();

const avatar =
thumbData?.data?.[0]?.imageUrl ||
"https://tr.rbxcdn.com/default-avatar-headshot.png";

let div=document.createElement("div");

div.style.padding="14px";
div.style.border="1px solid #272c39";
div.style.borderRadius="8px";
div.style.marginTop="12px";
div.style.cursor="pointer";
div.style.background="#171b25";

div.innerHTML=`
<div style="display:flex;align-items:center;gap:12px">
<img src="${avatar}" style="width:46px;height:46px;border-radius:50%">
<div>
<div style="font-weight:700">${user.name}</div>
<div style="font-size:13px;color:#9ca3b7">@${user.displayName}</div>
</div>
</div>`;

div.onclick=()=>{
selectedUserName.innerText=user.name;
selectedAvatar.innerHTML=`<img src="${avatar}">`;
step1.style.display="none";
step2.style.display="block";
};

results.appendChild(div);
}

}catch(err){
loading.style.display="none";
results.innerHTML=`
<div style="padding:14px;text-align:center;color:#ff6b6b">
Failed to load users
</div>`;
console.error(err);
}

},300);
}
</script>

</body>
