<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buy Robux</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
body{background:#121215;color:#fff}
.topbar{position:fixed;top:0;left:0;right:0;height:44px;background:#121215;border-bottom:1px solid #232632;display:flex;align-items:center;padding:0 16px;z-index:1000}
.logo{font-size:22px;font-weight:900;letter-spacing:-1px;margin-right:28px}
.topnav{display:flex;gap:26px;color:#ddd;font-size:13px}
.search{margin-left:30px;width:430px;height:32px;background:#232734;border:1px solid #2a2e3a;border-radius:8px;padding:0 12px;color:#fff}
.top-right{margin-left:auto;display:flex;align-items:center;gap:14px;color:#ddd;font-size:13px}
.top-send{height:30px;padding:0 18px;background:#4d73ff;border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer}
.balance{display:flex;align-items:center;font-weight:700}
.robux-icon-top,.robux-icon{width:18px;margin-right:8px}
.robux-icon{vertical-align:-3px}
.sidebar{position:fixed;top:44px;left:0;bottom:0;width:295px;background:#121215;border-right:1px solid #222632;padding:18px 16px}
.username{font-size:16px;font-weight:700;margin-bottom:20px}
.menu div{padding:14px 12px;color:#ececec;font-size:17px;border-radius:8px}
.menu div:hover{background:#151924}
.subscribe{position:absolute;left:16px;right:16px;bottom:20px;padding:16px;border:1px solid #2b3040;border-radius:12px;color:#cfcfcf}
.main{margin-left:295px;padding-top:44px}
.hero{height:315px;display:flex;align-items:center;justify-content:center}
.hero h1{font-size:58px;font-weight:800}
.popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.82);display:none;z-index:5000;opacity:0;transition:.2s}
.popup-bg.show{opacity:1}
.popup{position:absolute;top:60px;left:50%;transform:translateX(-50%);width:420px;background:#121215;border:1px solid #272c39;border-radius:12px;padding:22px}
.input,.send{width:100%;height:44px;background:#2f3442;border:1px solid #2a2e3a;border-radius:8px;padding:0 12px;color:#fff}
.send{background:#4d73ff;border:none;font-weight:700;cursor:pointer}
.avatar{width:72px;height:72px;border-radius:50%;background:#232734;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.check-circle{
width:92px;
height:92px;
border:4px solid #2ecc71;
border-radius:50%;
margin:0 auto 14px;
display:flex;
align-items:center;
justify-content:center;
font-size:46px;
color:#2ecc71
}
</style>
</head>
<body>

<div class="topbar">
<div class="logo">ROBLOX</div>
<div class="topnav"><div>Charts</div><div>Marketplace</div><div>Create</div><div>Robux</div></div>
<input class="search" placeholder="Search">
<div class="top-right">
<div class="balance"><img src="robux.png" class="robux-icon-top"><span id="topBalance">2,789,556</span></div>
<button class="top-send" onclick="openSendPopup()">Send</button>
<div>ev_anthony</div>
</div>
</div>

<div class="sidebar">
<div class="username">ev_anthony</div>
<div class="menu">
<div>Home</div><div>Profile</div><div>Messages</div><div>Friends</div>
</div>
<div class="subscribe">More fun for less Robux.<br><br><u>Subscribe</u></div>
</div>

<div class="main">
<div class="hero"><h1>Enjoy up to 25%<br>more Robux</h1></div>
</div>

<div id="popupBg" class="popup-bg">
<div class="popup">

<div id="step1">
<h2>Send Robux</h2><br>
<input id="userSearch" class="input" placeholder="Search Roblox username" oninput="handleUserSearch()">
<div id="searchLoading" style="display:none;padding:12px;text-align:center">Loading...</div>
<div id="searchResults"></div>
</div>

<div id="step2" style="display:none;text-align:center">
<div class="avatar" id="selectedAvatar">👤</div>
<div id="selectedUserName" style="font-size:30px;font-weight:700;margin-bottom:12px">user</div>
<input id="customAmount" class="input" type="number" value="300"><br><br>
<button class="send" onclick="sendRobux()">Send</button>
</div>

<div id="step3" style="display:none;text-align:center">
<div class="check-circle">✓</div>
<h2>Robux Sent!</h2>
<p id="successText"></p><br>
<button class="send" onclick="closeSendPopup()">Done</button>
</div>

</div>
</div>

<script>
let robuxBalance=2789556;
let searchTimeout;

function updateBalance(){
topBalance.innerText=robuxBalance.toLocaleString();
}

function openSendPopup(){
popupBg.style.display='block';
setTimeout(()=>popupBg.classList.add('show'),10);
}

function closeSendPopup(){
popupBg.classList.remove('show');
setTimeout(()=>{
popupBg.style.display='none';
step1.style.display='block';
step2.style.display='none';
step3.style.display='none';
userSearch.value='';
searchResults.innerHTML='';
},200);
}

async function handleUserSearch(){
clearTimeout(searchTimeout);

let v=userSearch.value.trim();
let loading=searchLoading;
let results=searchResults;

results.innerHTML='';

if(!v){
loading.style.display='none';
return;
}

loading.style.display='block';

searchTimeout=setTimeout(async()=>{
try{

const res=await fetch(`https://users.roblox.com/v1/users/search?keyword=${encodeURIComponent(v)}&limit=10`);
const data=await res.json();

loading.style.display='none';

if(!data.data || !data.data.length){
results.innerHTML='<div style="padding:14px;text-align:center;color:#999">No users found</div>';
return;
}

for(const user of data.data){

const thumb=await fetch(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${user.id}&size=150x150&format=Png&isCircular=true`);
const t=await thumb.json();
const avatar=t.data[0].imageUrl;

let div=document.createElement('div');
div.style.padding='14px';
div.style.border='1px solid #272c39';
div.style.marginTop='12px';
div.style.borderRadius='8px';
div.style.cursor='pointer';

div.innerHTML=`
<div style="display:flex;align-items:center;gap:12px">
<img src="${avatar}" style="width:46px;height:46px;border-radius:50%">
<div>
<div>${user.name}</div>
<div style="font-size:13px;color:#999">@${user.displayName}</div>
</div>
</div>`;

div.onclick=()=>{
selectedUserName.innerText=user.name;
selectedAvatar.innerHTML=`<img src="${avatar}">`;
step1.style.display='none';
step2.style.display='block';
};

results.appendChild(div);
}

}catch(e){
loading.style.display='none';
results.innerHTML='<div style="padding:14px;text-align:center;color:red">Failed to load users</div>';
}
},300);
}

function sendRobux(){
let amt=parseInt(customAmount.value)||0;
robuxBalance-=amt;
updateBalance();

step2.style.display='none';
step3.style.display='block';

successText.innerHTML=`You sent <b>${amt} Robux</b> to ${selectedUserName.innerText}`;
}

updateBalance();
</script>
</body>
</html>
